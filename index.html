<!DOCTYPE html>
<html lang="he" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key2Lev - Premium Services</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #c5a059; --dark-gold: #8e6d2d; --bg: #0f0f0f; --card: #1a1a1a; }
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* עיצוב כללי */
        .ad-container { max-width: 450px; width: 100%; background: linear-gradient(145deg, #151515, #0a0a0a); border: 1px solid var(--dark-gold); border-radius: 40px; padding: 30px 15px; text-align: center; position: relative; }
        .logo { font-size: 60px; font-weight: 900; color: var(--gold); margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .tagline { color: var(--gold); font-size: 12px; letter-spacing: 3px; margin-bottom: 30px; opacity: 0.8; }
        
        /* כרטיסי מומחים */
        .experts-grid { display: flex; gap: 15px; margin: 25px 0; }
        .expert-card { flex: 1; background: var(--card); padding: 15px; border-radius: 25px; border-bottom: 3px solid var(--dark-gold); }
        .photo-frame { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--gold); margin: 0 auto 10px; overflow: hidden; }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }
        .name { color: var(--gold); font-weight: bold; font-size: 18px; display: block; }
        
        /* טופס פנייה */
        .contact-form { background: #222; margin-top: 30px; padding: 20px; border-radius: 20px; text-align: right; }
        .contact-form h3 { color: var(--gold); margin-top: 0; text-align: center; }
        .contact-form input, .contact-form textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #444; background: #111; color: white; box-sizing: border-box; }
        .submit-btn { width: 100%; padding: 12px; background: var(--gold); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .submit-btn:hover { background: var(--dark-gold); }

        /* כפתורי ציפה */
        .floating-btns { position: fixed; bottom: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; }
        .f-btn { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 25px; color: white; text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .btn-whatsapp { background-color: #25d366; }
        .btn-phone { background-color: var(--gold); }

        /* שפות */
        .lang-btn { position: absolute; top: 20px; left: 20px; background: none; border: 1px solid var(--gold); color: var(--gold); padding: 5px 10px; border-radius: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="ad-container">
        <button class="lang-btn" onclick="toggleLanguage()">RU / HE</button>
        <div class="logo">key2lev</div>
        <div class="tagline" id="tagline">שירותי יוקרה לבית ולעסק</div>

        <h2 id="mainTitle">צריכים שיפוץ או חשמלאי?</h2>
        
        <div class="experts-grid">
            <div class="expert-card">
                <div class="photo-frame"><img src="FB_IMG_1773330238671.jpg" alt="Solomon"></div>
                <span class="name">סולומון</span>
                <small style="color: #888;">שיפוץ וגמר</small>
            </div>
            <div class="expert-card">
                <div class="photo-frame"><img src="FB_IMG_1773330225006.jpg" alt="Tom"></div>
                <span class="name">תום</span>
                <small style="color: #888;">חשמלאי מוסמך</small>
            </div>
        </div>

        <div class="contact-form">
            <h3 id="formTitle">השאירו פרטים ונחזור אליכם</h3>
            <form action="https://formspree.io/f/YOUR_ID_HERE" method="POST">
                <input type="text" name="name" placeholder="שם מלא" required>
                <input type="tel" name="phone" placeholder="טלפון" required>
                <textarea name="message" rows="3" placeholder="איזה שירות אתם צריכים?"></textarea>
                <button type="submit" class="submit-btn">שלח בקשה</button>
            </form>
        </div>
    </div>

    <div class="floating-btns">
        <a href="https://wa.me/972559804080" class="f-btn btn-whatsapp"><i class="fab fa-whatsapp"></i></a>
        <a href="tel:0559804080" class="f-btn btn-phone"><i class="fas fa-phone"></i></a>
    </div>

    <script>
        function toggleLanguage() {
            // כאן אפשר להוסיף את לוגיקת החלפת השפות מהקוד הקודם
            alert("Switching Language...");
        }
    </script>
</body>
</html>
