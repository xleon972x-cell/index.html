<!DOCTYPE html>
<html lang="he" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key2Lev | הסטנדרט החדש בשיפוץ וחשמל</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;900&family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold-primary: #d4af37; 
            --gold-light: #f1d592;
            --gold-dark: #b8860b;
            --bg-black: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --border-gold: rgba(212, 175, 55, 0.3);
        }

        * { box-sizing: border-box; transition: all 0.4s ease; }

        body { 
            font-family: 'Assistant', sans-serif; 
            background-color: var(--bg-black); 
            color: #ffffff; 
            margin: 0; 
            overflow-x: hidden;
            background-image: radial-gradient(circle at top right, #1a1a1a, transparent);
        }

        .container { max-width: 500px; width: 100%; margin: 0 auto; padding: 20px; }

        /* לוגו יוקרה מעוצב מחדש */
        .brand-header { text-align: center; padding: 40px 0; }
        .logo { 
            font-family: 'Cinzel', serif; 
            font-size: 62px; 
            font-weight: 900; 
            background: linear-gradient(to bottom, var(--gold-light), var(--gold-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            letter-spacing: -3px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
            animation: fadeInDown 1s ease;
        }
        .logo-underline { 
            width: 80px; height: 3px; 
            background: linear-gradient(90deg, transparent, var(--gold-primary), transparent);
            margin: 10px auto;
        }
        .premium-tag { 
            font-size: 11px; letter-spacing: 5px; color: var(--gold-primary); 
            text-transform: uppercase; font-weight: 300; opacity: 0.8;
        }

        /* כותרת ראשית שיווקית */
        .hero-title { 
            font-size: 28px; text-align: center; font-weight: 700; line-height: 1.2;
            margin: 40px 0; background: linear-gradient(white, #aaa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* כרטיסי המומחים - עיצוב VIP */
        .expert-card { 
            background: var(--glass);
            border: 1px solid var(--border-gold);
            border-radius: 40px;
            padding: 30px 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }
        .expert-card::after {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(212,175,55,0.05) 0%, transparent 70%);
        }

        .photo-wrapper { 
            width: 140px; height: 140px; border-radius: 50%; 
            padding: 5px; background: linear-gradient(var(--gold-primary), transparent);
            margin: 0 auto 20px;
        }
        .photo-wrapper img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--bg-black); }

        .expert-name { font-family: 'Cinzel', serif; font-size: 24px; color: var(--gold-light); margin: 0; }
        .expert-role { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }

        .service-tag { 
            display: inline-block; padding: 6px 15px; background: rgba(255,255,255,0.05);
            border-radius: 20px; font-size: 13px; margin: 4px; border: 1px solid rgba(255,255,255,0.1);
        }

        .phone-link { 
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-top: 20px; color: #fff; text-decoration: none; font-weight: 700; font-size: 18px;
        }
        .phone-link i { color: var(--gold-primary); font-size: 14px; }

        /* טופס פרימיום */
        .contact-section { 
            background: #111; border-radius: 40px; padding: 35px 25px; 
            border: 1px solid #222; margin-top: 50px;
        }
        .form-title { color: var(--gold-light); text-align: center; margin-bottom: 25px; font-size: 20px; }
        input, textarea { 
            width: 100%; background: #000; border: 1px solid #333; 
            padding: 15px; border-radius: 15px; color: #fff; margin-bottom: 15px;
            font-family: inherit;
        }
        input:focus { border-color: var(--gold-primary); outline: none; }

        .submit-btn { 
            width: 100%; padding: 18px; background: linear-gradient(45deg, var(--gold-dark), var(--gold-primary));
            border: none; border-radius: 15px; font-weight: 900; color: #000; 
            font-size: 18px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(184, 134, 11, 0.3);
        }
        .submit-btn:active { transform: scale(0.98); }

        /* וואטסאפ יוקרתי */
        .wa-float { 
            position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px;
            background: linear-gradient(145deg, var(--gold-light), var(--gold-dark));
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 30px; color: #000; text-decoration: none; z-index: 1000;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            animation: pulseGold 2s infinite;
        }

        @keyframes pulseGold {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }

        .lang-switch { position: absolute; top: 30px; left: 30px; background: var(--glass); border: 1px solid var(--border-gold); color: var(--gold-light); padding: 8px 15px; border-radius: 12px; cursor: pointer; font-size: 12px; font-weight: 700; }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <button class="lang-switch" onclick="toggleLanguage()">RU / HE</button>

    <div class="container">
        <header class="brand-header">
            <h1 class="logo">key2lev</h1>
            <div class="logo-underline"></div>
            <div class="premium-tag" id="tagline">PREMIUM HOME SOLUTIONS</div>
        </header>

        <h2 class="hero-title" id="mainTitle">אנחנו לא רק משפצים,<br>אנחנו יוצרים חלומות.</h2>

        <div class="expert-card" style="text-align: center;">
            <div class="photo-wrapper">
                <img src="FB_IMG_1773330238671.jpg" alt="Solomon">
            </div>
            <h3 class="expert-name">Solomon</h3>
            <div class="expert-role" id="role1">Art Director of Renovation</div>
            
            <div id="services1">
                <span class="service-tag">שיפוצי יוקרה</span>
                <span class="service-tag">תחזוקת משרדי הייטק</span>
                <span class="service-tag">עיצוב בגבס</span>
            </div>

            <a href="tel:0559804080" class="phone-link">
                <i class="fas fa-phone"></i>
                055-980-4080
            </a>
        </div>

        <div class="expert-card" style="text-align: center;">
            <div class="photo-wrapper">
                <img src="FB_IMG_1773330225006.jpg" alt="Artyom">
            </div>
            <h3 class="expert-name">Artyom</h3>
            <div class="expert-role" id="role2">Master Electrician</div>
            
            <div id="services2">
                <span class="service-tag">תשתיות חשמל</span>
                <span class="service-tag">בית חכם</span>
                <span class="service-tag">גופי תאורה מעוצבים</span>
            </div>

            <a href="tel:0549763940" class="phone-link">
                <i class="fas fa-phone"></i>
                054-976-3940
            </a>
        </div>

        <section class="contact-section">
            <h3 class="form-title" id="formTitle">בואו נתחיל בפרויקט שלכם</h3>
            <form action="https://formspree.io/f/mojkwwrd" method="POST">
                <input type="text" name="name" placeholder="שם מלא" required>
                <input type="tel" name="phone" placeholder="מספר טלפון" required>
                <textarea name="message" rows="3" placeholder="ספרו לנו על החזון שלכם..."></textarea>
                <button type="submit" class="submit-btn" id="submitBtn">תיאום פגישת ייעוץ</button>
            </form>
        </section>

        <footer style="text-align: center; padding: 40px 0;">
            <div class="premium-tag">K E Y 2 L E V • 2 0 2 6</div>
        </footer>
    </div>

    <a href="https://wa.me/972559804080" class="wa-float">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        let currentLang = 'he';
        const data = {
            he: { 
                tagline: "PREMIUM HOME SOLUTIONS", 
                title: "אנחנו לא רק משפצים,<br>אנחנו יוצרים חלומות.", 
                role1: "Art Director of Renovation", 
                role2: "Master Electrician", 
                formTitle: "בואו נתחיל בפרויקט שלכם", 
                submit: "תיאום פגישת ייעוץ",
                s1: ["שיפוצי יוקרה", "תחזוקת משרדי הייטק", "עיצוב בגבס"],
                s2: ["תשתיות חשמל", "בית חכם", "גופי תאורה מעוצבים"]
            },
            ru: { 
                tagline: "ПРЕМИАЛЬНЫЕ РЕШЕНИЯ ДЛЯ ДОМА", 
                title: "Мы לא просто ремонтируем,<br>мы создаем мечты.", 
                role1: "Арт-директор по ремонту", 
                role2: "Мастер-электрик", 
                formTitle: "Давайте начнем ваш проект", 
                submit: "Заרוнировать консультацию",
                s1: ["Элитный ремонт", "Обслуживание офисов", "Дизайн из гипса"],
                s2: ["Электросети", "Умный дом", "Дизайнерское освещение"]
            }
        };

        function toggleLanguage() {
            const html = document.getElementById('mainHtml');
            currentLang = currentLang === 'he' ? 'ru' : 'he';
            html.dir = currentLang === 'he' ? 'rtl' : 'ltr';
            
            document.getElementById('tagline').innerText = data[currentLang].tagline;
            document.getElementById('mainTitle').innerHTML = data[currentLang].title;
            document.getElementById('role1').innerText = data[currentLang].role1;
            document.getElementById('role2').innerText = data[currentLang].role2;
            document.getElementById('formTitle').innerText = data[currentLang].formTitle;
            document.getElementById('submitBtn').innerText = data[currentLang].submit;

            // עדכון תגיות שירות
            const s1Box = document.getElementById('services1');
            const s2Box = document.getElementById('services2');
            s1Box.innerHTML = data[currentLang].s1.map(s => `<span class="service-tag">${s}</span>`).join('');
            s2Box.innerHTML = data[currentLang].s2.map(s => `<span class="service-tag">${s}</span>`).join('');
        }
    </script>
</body>
</html>
