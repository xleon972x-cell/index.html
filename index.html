<!DOCTYPE html>
<html lang="he" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key2Lev | צבע, חשמל ותחזוקה</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            /* גוון זהב-ברונזה עמוק ויוקרתי */
            --bronze-gold: #cd7f32; 
            --bronze-light: #e6be8a;
            --bg-black: #050505; 
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg-black); color: #fff; margin: 0; overflow-x: hidden; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; position: relative; }

        /* כפתורי שליטה */
        .top-controls { position: absolute; top: 20px; width: calc(100% - 40px); display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .lang-switch { background: none; border: 1px solid var(--bronze-gold); color: var(--bronze-gold); padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 700; }
        .wa-top { width: 50px; height: 50px; background: var(--bronze-gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; color: #000; text-decoration: none; box-shadow: 0 4px 15px rgba(205, 127, 50, 0.4); }

        /* לוגו מקורי בגוון ברונזה */
        .brand-header { text-align: center; padding: 60px 0 30px 0; }
        .logo { 
            font-family: 'Cinzel', serif; 
            font-size: 55px; 
            font-weight: 900; 
            background: linear-gradient(to bottom, var(--bronze-light), var(--bronze-gold)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            text-transform: uppercase; 
            margin: 0; 
            letter-spacing: 2px;
        }

        /* סליידר */
        .slider-container { width: 100%; overflow: hidden; margin: 20px 0; cursor: pointer; }
        .slider-track { display: flex; width: 200%; animation: scrollLoop 15s linear infinite; }
        @keyframes scrollLoop { 0% { transform: translateX(0); } 100% { transform: translateX(50%); } }
        .expert-card { flex: 1; padding: 20px; text-align: center; min-width: 50%; }
        .photo-wrapper { width: 120px; height: 120px; border-radius: 50%; border: 2px solid var(--bronze-gold); margin: 0 auto 15px; overflow: hidden; }
        .photo-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .expert-name { font-size: 24px; color: var(--bronze-gold); margin: 0; font-weight: 700; }

        /* מודל פרופיל */
        .modal { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #111; border: 1px solid var(--bronze-gold); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; position: relative; text-align: center; }
        .close-modal { position: absolute; top: 15px; left: 15px; color: var(--bronze-gold); font-size: 30px; cursor: pointer; }
        .modal-photo { width: 110px; height: 110px; border-radius: 50%; border: 2px solid var(--bronze-gold); margin-bottom: 15px; object-fit: cover; }
        .modal-info { text-align: right; margin-top: 20px; line-height: 1.8; font-size: 16px; }
        .modal-info b { color: var(--bronze-gold); }
        #mainHtml[dir="ltr"] .modal-info { text-align: left; }

        /* טופס */
        .form-section { background: #0a0a0a; border-radius: 20px; padding: 30px; border: 1px solid #1a1a1a; margin-top: 20px; }
        .form-section h3 { color: var(--bronze-gold); text-align: center; margin-bottom: 20px; font-size: 22px; }
        input, textarea { width: 100%; background: #000; border: 1px solid #222; padding: 15px; border-radius: 10px; color: #fff; margin-bottom: 15px; font-family: inherit; }
        input:focus { border-color: var(--bronze-gold); outline: none; }
        .submit-btn { width: 100%; padding: 18px; background: var(--bronze-gold); border: none; border-radius: 10px; font-weight: 900; color: #000; cursor: pointer; text-transform: uppercase; font-size: 16px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="top-controls">
            <button class="lang-switch" onclick="toggleLanguage()">РУ / HE</button>
            <a href="https://wa.me/972559804080" class="wa-top"><i class="fab fa-whatsapp"></i></a>
        </div>

        <header class="brand-header">
            <h1 class="logo">key2lev</h1>
        </header>

        <div class="slider-container">
            <div class="slider-track" id="track">
                <div class="expert-card" onclick="openProfile('solomon')">
                    <div class="photo-wrapper"><img src="FB_IMG_1773330238671.jpg"></div>
                    <h3 class="expert-name">סולומון זרוצבסקי</h3>
                </div>
                <div class="expert-card" onclick="openProfile('artyom')">
                    <div class="photo-wrapper"><img src="FB_IMG_1773330225006.jpg"></div>
                    <h3 class="expert-name">ארתיום צרנוב</h3>
                </div>
            </div>
        </div>

        <section class="form-section">
            <h3 id="formTitle">יצירת קשר</h3>
            <form action="https://formspree.io/f/mojkwwrd" method="POST">
                <input type="text" name="name" id="p_name" placeholder="שם מלא" required>
                <input type="tel" name="phone" id="p_phone" placeholder="טלפון" required>
                <textarea name="message" id="p_msg" rows="3" placeholder="איך נוכל לעזור?"></textarea>
                <button type="submit" class="submit-btn" id="p_btn">שליחת פנייה</button>
            </form>
        </section>
    </div>

    <div id="profileModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeProfile()">&times;</span>
            <img id="modalImg" class="modal-photo" src="">
            <h2 id="modalName" style="color: var(--bronze-gold); margin: 0; font-size: 26px;"></h2>
            <div class="modal-info" id="modalBio"></div>
        </div>
    </div>

    <script>
        let currentLang = 'he';
        
        const profiles = {
            solomon: {
                he: { name: "סולומון זרוצבסקי", bio: "<b>עיר מגורים:</b> נתניה<br><b>התמחות:</b> צבע אמנותי, חידוש בתים ותחזוקת משרדים.<br><b>ניסיון:</b> מומחה בגימורים קוסמטיים ותיקונים מורכבים.", img: "FB_IMG_1773330238671.jpg" },
                ru: { name: "Соломон Заручевский", bio: "<b>Город:</b> Нетания<br><b>Специализация:</b> Покраска, обновление домов и обслуживание офисов.<br><b>Опыт:</b> Эксперт по косметическому ремонту и сложной отделке.", img: "FB_IMG_1773330238671.jpg" }
            },
            artyom: {
                he: { name: "ארתיום צרנוב", bio: "<b>עיר מגורים:</b> קרית ים<br><b>התמחות:</b> חשמלאי מוסמך, תשתיות חשמל ותאורה.<br><b>ניסיון:</b> התקנת לוחות חשמל, פתרונות תקשורת ותאורה חכמה.", img: "FB_IMG_1773330225006.jpg" },
                ru: { name: "Артём Чернов", bio: "<b>Город:</b> Кирьят-Ям<br><b>Специализация:</b> Лицензированный электрик, инфраструктура и освещение.<br><b>Опыт:</b> Установка щитков, систем связи и умного освещения.", img: "FB_IMG_1773330225006.jpg" }
            }
        };

        function openProfile(id) {
            const p = profiles[id][currentLang];
            document.getElementById('modalName').innerText = p.name;
            document.getElementById('modalBio').innerHTML = p.bio;
            document.getElementById('modalImg').src = p.img;
            document.getElementById('profileModal').style.display = 'flex';
            document.getElementById('track').style.animationPlayState = 'paused';
        }

        function closeProfile() {
            document.getElementById('profileModal').style.display = 'none';
            document.getElementById('track').style.animationPlayState = 'running';
        }

        function toggleLanguage() {
            currentLang = currentLang === 'he' ? 'ru' : 'he';
            document.getElementById('mainHtml').dir = currentLang === 'he' ? 'rtl' : 'ltr';
            document.getElementById('formTitle').innerText = currentLang === 'he' ? "יצירת קשר" : "Связаться с нами";
            document.getElementById('p_name').placeholder = currentLang === 'he' ? "שם מלא" : "Имя";
            document.getElementById('p_phone').placeholder = currentLang === 'he' ? "טלפון" : "Телефон";
            document.getElementById('p_msg').placeholder = currentLang === 'he' ? "איך נוכל לעזור?" : "Чем помочь?";
            document.getElementById('p_btn').innerText = currentLang === 'he' ? "שליחת פנייה" : "Отправить";
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById('profileModal')) {
                closeProfile();
            }
        }
    </script>
</body>
</html>
