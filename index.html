<!DOCTYPE html>
<html lang="he" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key2Lev - Premium Services</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #c5a059; --dark-gold: #8e6d2d; --bg: #0a0a0a; --card: #151515; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); color: white; margin: 0; padding: 20px 10px; display: flex; flex-direction: column; align-items: center; }
        
        .ad-container { max-width: 450px; width: 100%; background: linear-gradient(180deg, #1a1a1a 0%, #0a0a0a 100%); border: 1px solid rgba(197, 160, 89, 0.3); border-radius: 35px; padding: 30px 15px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
        .logo { font-size: 55px; font-weight: 900; color: var(--gold); margin: 0; letter-spacing: -1px; }
        .tagline { color: var(--gold); font-size: 13px; letter-spacing: 2px; margin-bottom: 30px; opacity: 0.8; }
        
        .experts-grid { display: flex; gap: 15px; margin: 25px 0; }
        .expert-card { flex: 1; background: var(--card); padding: 15px; border-radius: 25px; border: 1px solid #222; border-bottom: 3px solid var(--dark-gold); }
        .photo-frame { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--gold); margin: 0 auto 12px; overflow: hidden; }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }
        .name { color: var(--gold); font-weight: bold; font-size: 19px; display: block; }

        /* טופס פנייה מעוצב */
        .contact-form { background: #1a1a1a; margin-top: 30px; padding: 20px; border-radius: 25px; border: 1px solid #333; text-align: right; }
        .contact-form h3 { color: var(--gold); margin: 0 0 15px 0; text-align: center; font-size: 18px; }
        .contact-form input, .contact-form textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #333; background: #0a0a0a; color: white; box-sizing: border-box; font-family: inherit; }
        .submit-btn { width: 100%; padding: 14px; background: var(--gold); border: none; border-radius: 12px; font-weight: bold; color: #000; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .submit-btn:hover { background: var(--dark-gold); }

        /* כפתורים צפים */
        .floating-btns { position: fixed; bottom: 25px; left: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 1000; }
        .f-btn { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; color: white; text-decoration: none; box-shadow: 0 5px 20px rgba(0,0,0,0.6); transition: 0.3s; }
        .btn-whatsapp { background-color: #25d366; }
        .btn-phone { background-color: var(--gold); }
        
        .contact-box { margin-top: 25px; padding: 15px; border-top: 1px solid #222; }
        .contact-item { display: flex; justify-content: space-between; margin: 10px 0; font-size: 18px; color: var(--gold); text-decoration: none; font-weight: bold; }

        .lang-btn { position: absolute; top: 20px; left: 20px; background: none; border: 1px solid var(--gold); color: var(--gold); padding: 5px 12px; border-radius: 20px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

    <div class="ad-container">
        <button class="lang-btn" onclick="toggleLanguage()">RU / HE</button>
        <div class="logo">key2lev</div>
        <div id="tagline" class="tagline">שירותי יוקרה לבית ולעסק</div>

        <h2 id="mainTitle" style="font-size: 22px;">צריכים שיפוץ קוסמטי או תקלת חשמל?</h2>
        
        <div class="experts-grid">
            <div class="expert-card">
                <div class="photo-frame"><img src="FB_IMG_1773330238671.jpg" alt="Solomon"></div>
                <span class="name">סולומון</span>
                <small id="role1" style="color: #888;">שיפוץ וגמר</small>
            </div>
            <div class="expert-card">
                <div class="photo-frame"><img src="FB_IMG_1773330225006.jpg" alt="Tom"></div>
                <span class="name">תום</span>
                <small id="role2" style="color: #888;">חשמלאי מוסמך</small>
            </div>
        </div>

        <div class="contact-form">
            <h3 id="formTitle">השאירו פרטים ונחזור אליכם</h3>
            <form action="https://formspree.io/f/mojkwwrd" method="POST">
                <input type="text" name="name" placeholder="שם מלא" required>
                <input type="tel" name="phone" placeholder="מספר טלפון" required>
                <textarea name="message" rows="2" placeholder="איך נוכל לעזור?"></textarea>
                <button type="submit" id="submitBtn" class="submit-btn">שלח בקשה</button>
            </form>
        </div>

        <div class="contact-box">
            <a href="tel:0559804080" class="contact-item"><span>סולומון</span><span>055-980-4080</span></a>
            <a href="tel:0549763940" class="contact-item"><span>ארתיום</span><span>054-976-3940</span></a>
        </div>
    </div>

    <div class="floating-btns">
        <a href="https://wa.me/972559804080" class="f-btn btn-whatsapp"><i class="fab fa-whatsapp"></i></a>
        <a href="tel:0559804080" class="f-btn btn-phone"><i class="fas fa-phone"></i></a>
    </div>

    <script>
        let currentLang = 'he';
        const data = {
            he: { tagline: "שירותי יוקרה לבית ולעסק", title: "צריכים שיפוץ קוסמטי או תקלת חשמל?", role1: "שיפוץ וגמר", role2: "חשמלאי מוסמך", formTitle: "השאירו פרטים ונחזור אליכם", submit: "שלח בקשה" },
            ru: { tagline: "Премиальные услуги для дома и офиса", title: "Нужен ремонт или услуги электрика?", role1: "Ремонт и отделка", role2: "Лицензированный электрик", formTitle: "Оставьте заявку", submit: "Отправить" }
        };

        function toggleLanguage() {
            const html = document.getElementById('mainHtml');
            currentLang = currentLang === 'he' ? 'ru' : 'he';
            html.dir = currentLang === 'he' ? 'rtl' : 'ltr';
            
            document.getElementById('tagline').innerText = data[currentLang].tagline;
            document.getElementById('mainTitle').innerText = data[currentLang].title;
            document.getElementById('role1').innerText = data[currentLang].role1;
            document.getElementById('role2').innerText = data[currentLang].role2;
            document.getElementById('formTitle').innerText = data[currentLang].formTitle;
            document.getElementById('submitBtn').innerText = data[currentLang].submit;
        }
    </script>
</body>
</html>
