<!DOCTYPE html>
<html lang="he" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key2Lev | תחזוקה ושירותי בית</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Assistant:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bronze-gold: #cd7f32; 
            --bg-black: #050505; 
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg-black); color: #fff; margin: 0; overflow-x: hidden; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; position: relative; }

        /* כפתור וואטסאפ צף */
        .wa-float { position: absolute; top: 20px; right: 20px; width: 50px; height: 50px; background: #25d366; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; color: #fff; text-decoration: none; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* לוגו */
        .brand-header { text-align: center; padding: 60px 0 20px 0; }
        .logo { font-family: 'Cinzel', serif; font-size: 50px; font-weight: 900; color: var(--bronze-gold); text-transform: uppercase; margin: 0; }
        .tagline { color: var(--bronze-gold); font-size: 14px; font-weight: 700; margin-top: 5px; }

        /* כרטיסי מומחים בסליידר */
        .slider-container { width: 100%; overflow: hidden; margin: 20px 0; }
        .slider-track { display: flex; width: 200%; animation: scrollLoop 15s linear infinite; }
        @keyframes scrollLoop { 0% { transform: translateX(0); } 100% { transform: translateX(50%); } }
        
        .expert-card { flex: 1; padding: 20px; text-align: center; min-width: 50%; cursor: pointer; }
        .photo-wrapper { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--bronze-gold); margin: 0 auto 15px; overflow: hidden; }
        .photo-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .expert-name { font-size: 24px; color: var(--bronze-gold); margin: 0; font-weight: 700; }
        .expert-role { font-size: 14px; color: #aaa; margin: 5px 0; }
        .expert-phone { font-size: 16px; color: #fff; font-weight: 700; display: block; }

        /* למה אנחנו */
        .why-us { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 20px; margin: 30px 0; border: 1px solid rgba(205, 127, 50, 0.2); }
        .why-us h3 { color: var(--bronze-gold); text-align: center; margin-bottom: 15px; }
        .why-point { margin-bottom: 15px; border-right: 3px solid var(--bronze-gold); padding-right: 15px; }
        .why-point b { color: var(--bronze-gold); display: block; }

        /* טופס צור קשר */
        .contact-form { background: #0a0a0a; padding: 25px; border-radius: 20px; border: 1px solid #1a1a1a; }
        .contact-form h3 { color: var(--bronze-gold); text-align: center; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; background: #000; border: 1px solid #222; color: #fff; border-radius: 10px; }
        .submit-btn { width: 100%; padding: 18px; background: var(--bronze-gold); border: none; border-radius: 10px; font-weight: 900; color: #000; cursor: pointer; }

        /* מודל פרופיל */
        .modal { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #111; border: 1px solid var(--bronze-gold); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; position: relative; text-align: center; }
        .close-modal { position: absolute; top: 10px; left: 15px; color: var(--bronze-gold); font-size: 30px; cursor: pointer; }
        .modal-photo { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--bronze-gold); margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <a href="https://wa.me/972559804080" class="wa-float"><i class="fab fa-whatsapp"></i></a>

        <header class="brand-header">
            <h1 class="logo">key2lev</h1>
            <div class="tagline">שירותי תחזוקה לבית ולעסק</div>
        </header>

        <div class="slider-container">
            <div class="slider-track" id="track">
                <div class="expert-card" onclick="openProfile('artyom')">
                    <div class="photo-wrapper"><img src="FB_IMG_1773330225006.jpg"></div>
                    <h3 class="expert-name">ארתיום</h3>
                    <div class="expert-role">חשמלאי - התקנות ותחזוקה</div>
                    <span class="expert-phone">054-976-3940</span>
                </div>
                <div class="expert-card" onclick="openProfile('solomon')">
                    <div class="photo-wrapper"><img src="FB_IMG_1773330238671.jpg"></div>
                    <h3 class="expert-name">סולומון</h3>
                    <div class="expert-role">תחזוקת משרדים ותיקון קוסמטי</div>
                    <span class="expert-phone">055-980-4080</span>
                </div>
            </div>
        </div>

        <section class="why-us">
            <h3>למה Key2Lev?</h3>
            <div class="why-point">
                <b>שירות לקוח מעל הכל</b>
                <span>גמישות, אמינות ואיכות עבודה ללא פשרות.</span>
            </div>
            <div class="why-point">
                <b>עבודה מסודרת ונקייה</b>
                <span>אנחנו משאירים חלל נקי ומוכן לשימוש.</span>
            </div>
        </section>

        <section class="contact-form">
            <h3>צרו קשר</h3>
            <form action="https://formspree.io/f/mojkwwrd" method="POST">
                <input type="text" name="name" placeholder="שם מלא" required>
                <input type="tel" name="phone" placeholder="טלפון" required>
                <button type="submit" class="submit-btn">שליחת פנייה</button>
            </form>
        </section>
    </div>

    <div id="profileModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeProfile()">&times;</span>
            <img id="modalImg" class="modal-photo" src="">
            <div id="modalBio" style="text-align: right; line-height: 1.6;"></div>
        </div>
    </div>

    <script>
        const profiles = {
            solomon: { 
                img: "FB_IMG_1773330238671.jpg",
                bio: "<b>סולומון - תיקון ותחזוקה</b><br><br>• <b>תיקון קוסמטי:</b> צביעת דירות ותיקוני צבע.<br>• <b>תחזוקת משרדים:</b> שירות מפתח - הגעה פעמיים בשבוע, החלפת פחים ותחזוקה שוטפת." 
            },
            artyom: { 
                img: "FB_IMG_1773330225006.jpg",
                bio: "<b>ארתיום - שירותי חשמל</b><br><br>• <b>התקנות:</b> מאווררי תקרה, מנורות וגופי חימום.<br>• <b>תחזוקה:</b> החלפת שקעים ומתגים ובדיקת תקינות בסיסית." 
            }
        };

        function openProfile(id) {
            document.getElementById('modalImg').src = profiles[id].img;
            document.getElementById('modalBio').innerHTML = profiles[id].bio;
            document.getElementById('profileModal').style.display = 'flex';
            document.getElementById('track').style.animationPlayState = 'paused';
        }

        function closeProfile() {
            document.getElementById('profileModal').style.display = 'none';
            document.getElementById('track').style.animationPlayState = 'running';
        }

        window.onclick = function(event) { if (event.target == document.getElementById('profileModal')) closeProfile(); }
    </script>
</body>
</html>
