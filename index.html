<!DOCTYPE html>
<html lang="he" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key2Lev | פתרונות פרמיום</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;900&family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold-primary: #d4af37; 
            --gold-light: #f1d592;
            --gold-dark: #b8860b;
            --bg-black: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --border-gold: rgba(212, 175, 55, 0.3);
        }

        * { box-sizing: border-box; transition: all 0.4s ease; }
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg-black); color: #fff; margin: 0; overflow-x: hidden; background-image: radial-gradient(circle at top right, #1a1a1a, transparent); }
        .container { max-width: 500px; width: 100%; margin: 0 auto; padding: 20px; }

        /* לוגו */
        .brand-header { text-align: center; padding: 40px 0; }
        .logo { font-family: 'Cinzel', serif; font-size: 62px; font-weight: 900; background: linear-gradient(to bottom, var(--gold-light), var(--gold-dark)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; letter-spacing: -3px; }
        .premium-tag { font-size: 14px; letter-spacing: 2px; color: var(--gold-primary); font-weight: 700; margin-top: 10px; }

        /* כותרת */
        .hero-title { font-size: 30px; text-align: center; font-weight: 700; margin: 40px 0; background: linear-gradient(white, #aaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* סליידר פרופילים */
        .slider-section { width: 100%; overflow: hidden; background: var(--glass); border-radius: 40px; border: 1px solid var(--border-gold); backdrop-filter: blur(10px); }
        .slider-wrapper { display: flex; width: 200%; animation: slideLeftToRight 12s infinite linear; }
        @keyframes slideLeftToRight { 0% { transform: translateX(0); } 100% { transform: translateX(50%); } }
        .expert-card { flex: 1; padding: 30px 20px; text-align: center; }
        .photo-wrapper { width: 130px; height: 130px; border-radius: 50%; padding: 5px; background: linear-gradient(var(--gold-primary), transparent); margin: 0 auto 20px; }
        .photo-wrapper img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--bg-black); }
        .expert-name { font-size: 26px; color: var(--gold-light); margin: 0; font-weight: 700; }
        .service-tag { display: inline-block; padding: 8px 18px; background: rgba(255,255,255,0.05); border-radius: 25px; font-size: 14px; margin: 5px; border: 1px solid rgba(255,255,255,0.1); }

        /* טופס */
        .contact-section { background: #111; border-radius: 40px; padding: 35px 25px; border: 1px solid #222; margin-top: 50px; }
        input, textarea { width: 100%; background: #000; border: 1px solid #333; padding: 16px; border-radius: 15px; color: #fff; margin-bottom: 18px; }
        .submit-btn { width: 100%; padding: 18px; background: linear-gradient(45deg, var(--gold-dark), var(--gold-primary)); border: none; border-radius: 15px; font-weight: 900; color: #000; font-size: 20px; cursor: pointer; box-shadow: 0 10px 20px rgba(184, 134, 11, 0.3); }

        /* --- מערכת צ'אט אונליין (WhatsApp Widget) --- */
        .chat-widget { position: fixed; bottom: 30px; right: 30px; z-index: 1000; display: flex; flex-direction: column; align-items: flex-end; }
        .chat-bubble { background: linear-gradient(145deg, var(--gold-light), var(--gold-dark)); color: #000; padding: 12px 20px; border-radius: 20px 20px 0 20px; font-weight: 700; margin-bottom: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); font-size: 14px; animation: bounce 2s infinite; }
        .chat-button { width: 65px; height: 65px; background: #25d366; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; color: #fff; text-decoration: none; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-5px);} 60% {transform: translateY(-3px);} }

        .lang-switch { position: absolute; top: 30px; left: 30px; background: var(--glass); border: 1px solid var(--border-gold); color: var(--gold-light); padding: 8px 15px; border-radius: 12px; cursor: pointer; z-index: 10; }
    </style>
</head>
<body>

    <button class="lang-switch" onclick="toggleLanguage()">RU / HE</button>

    <div class="container">
        <header class="brand-header">
            <h1 class="logo">key2lev</h1>
            <div class="premium-tag" id="tagline">פרמיום פתרונות לבתים ולמשרדים</div>
        </header>

        <h2 class="hero-title" id="mainTitle">אנחנו לא רק משפצים,<br>אנחנו יוצרים חלומות.</h2>

        <section class="slider-section">
            <div class="slider-wrapper">
                <div class="expert-card">
                    <div class="photo-wrapper"><img src="FB_IMG_1773330238671.jpg" alt="Solomon"></div>
                    <h3 class="expert-name">סולומון</h3>
                    <div id="services1">
                        <span class="service-tag">שיפוצי יוקרה</span>
                        <span class="service-tag">תחזוקת משרדים</span>
                    </div>
                </div>
                <div class="expert-card">
                    <div class="photo-wrapper"><img src="FB_IMG_1773330225006.jpg" alt="Artyom"></div>
                    <h3 class="expert-name">ארתיום</h3>
                    <div id="services2">
                        <span class="service-tag">חשמלאי מוסמך</span>
                        <span class="service-tag">בית חכם</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="contact-section">
            <form action="https://formspree.io/f/mojkwwrd" method="POST">
                <input type="text" name="name" placeholder="שם מלא" required>
                <input type="tel" name="phone" placeholder="מספר טלפון" required>
                <textarea name="message" rows="3" placeholder="ספרו לנו על הפרויקט..."></textarea>
                <button type="submit" class="submit-btn">תיאום פגישת ייעוץ</button>
            </form>
        </section>
    </div>

    <div class="chat-widget">
        <div class="chat-bubble" id="chatMsg">שלום! איך נוכל לעזור?</div>
        <a href="https://wa.me/972559804080?text=שלום,%20אשמח%20לקבל%20פרטים%20נוספים%20לגבי..." class="chat-button">
            <i class="fab fa-whatsapp"></i>
        </a>
    </div>

    <script>
        let currentLang = 'he';
        function toggleLanguage() {
            currentLang = currentLang === 'he' ? 'ru' : 'he';
            document.getElementById('mainHtml').dir = currentLang === 'he' ? 'rtl' : 'ltr';
            document.getElementById('tagline').innerText = currentLang === 'he' ? "פרמיום פתרונות לבתים ולמשרדים" : "ПРЕМИАЛЬНЫЕ РЕШЕНИЯ ДЛЯ ДОМА";
            document.getElementById('chatMsg').innerText = currentLang === 'he' ? "שלום! איך נוכל לעזור?" : "Привет! Чем помочь?";
            // כאן אפשר להוסיף עוד תרגומים
        }
    </script>
</body>
</html>
